name: FDE Tracker CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        channel: [stable]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.channel }}
          cache: true

      - name: Verify Flutter installation
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --no-pub

      - name: Build debug APK
        run: flutter build apk --debug

  android-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.JKS_BASE64 }}" | base64 -d > ${{ github.workspace }}/neopunto.jks

      - name: Create key.properties
        run: |
          cat > ${{ github.workspace }}/android/key.properties << EOF
          storeFile=${{ github.workspace }}/neopunto.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build signed AAB
        run: flutter build appbundle --release

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: fde-tracker-signed-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Cleanup keystore
        if: always()
        run: rm -f ${{ github.workspace }}/neopunto.jks
